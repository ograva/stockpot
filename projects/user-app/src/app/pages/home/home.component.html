<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

        <!-- Welcome Card -->
        <mat-card class="cardWithShadow text-center" data-test-id="home-welcome-card">
            <mat-card-content class="p-32">

                <div class="m-b-24">
                    <i-tabler name="user-circle" class="icon-64 text-primary d-flex m-auto m-b-16"></i-tabler>
                    <h1 class="f-s-28 f-w-600 m-b-8" data-test-id="home-welcome-message">
                        Welcome back, {{ displayName }}!
                    </h1>
                    <p class="text-muted m-b-0">
                        Manage your account and keep your profile up to date.
                    </p>
                </div>

                <mat-divider class="m-b-24"></mat-divider>

                <!-- Profile CTA -->
                <a mat-raised-button color="primary" [routerLink]="['/dashboard/profile']" class="m-b-16"
                    data-test-id="home-profile-cta">
                    <i-tabler name="user-edit" class="icon-18 d-flex"></i-tabler>
                    My Profile
                </a>

            </mat-card-content>
        </mat-card>

        <!-- Quick Links -->
        <div class="row m-t-24">
            <div class="col-6">
                <mat-card class="cardWithShadow text-center" data-test-id="home-quick-link-profile">
                    <mat-card-content class="p-24">
                        <i-tabler name="id" class="icon-32 text-primary d-flex m-auto m-b-8"></i-tabler>
                        <p class="f-w-500 m-b-4">Profile</p>
                        <p class="text-muted f-s-12 m-b-12">Update your details</p>
                        <a mat-button color="primary" [routerLink]="['/dashboard/profile']">Go</a>
                    </mat-card-content>
                </mat-card>
            </div>
            <div class="col-6">
                <mat-card class="cardWithShadow text-center" data-test-id="home-quick-link-account">
                    <mat-card-content class="p-24">
                        <i-tabler name="settings" class="icon-32 text-secondary d-flex m-auto m-b-8"></i-tabler>
                        <p class="f-w-500 m-b-4">Account</p>
                        <p class="text-muted f-s-12 m-b-12">Manage settings</p>
                        <a mat-button color="primary" [routerLink]="['/dashboard/profile']">Go</a>
                    </mat-card-content>
                </mat-card>
            </div>
        </div>

    </div>
</div>
