<mat-card class="cardWithShadow" data-test-id="users-page">
    <mat-card-header class="p-24 p-b-0">
        <mat-card-title>Users</mat-card-title>
        <mat-card-subtitle>Manage registered users</mat-card-subtitle>
        <span class="flex-fill"></span>
        <button mat-raised-button color="primary" data-test-id="users-new-button" (click)="navigateToNew()">
            <i-tabler name="plus" class="icon-18 d-flex"></i-tabler>
            New User
        </button>
    </mat-card-header>

    <mat-card-content class="p-24">
        <!-- Search -->
        <mat-form-field appearance="outline" class="w-100 m-b-16">
            <mat-label>Search users</mat-label>
            <input matInput data-test-id="users-search-input" [value]="searchTerm()" (input)="onSearch($event)"
                placeholder="Filter by name or email" />
            <i-tabler matSuffix name="search" class="icon-18 d-flex m-r-8"></i-tabler>
        </mat-form-field>

        <!-- Empty state -->
        @if (filteredUsers().length === 0) {
        <div class="text-center p-32" data-test-id="users-empty-state">
            <i-tabler name="users-off" class="icon-48 text-muted d-flex m-auto m-b-16"></i-tabler>
            <p class="text-muted m-b-0">No users found.</p>
        </div>
        } @else {
        <table mat-table [dataSource]="filteredUsers()" class="w-100" data-test-id="users-table">
            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Name</th>
                <td mat-cell *matCellDef="let user" data-test-id="user-name-cell">
                    {{ user.name }}
                </td>
            </ng-container>

            <!-- Email Column -->
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef>Email</th>
                <td mat-cell *matCellDef="let user" data-test-id="user-email-cell">
                    {{ user.email }}
                </td>
            </ng-container>

            <!-- Role Column -->
            <ng-container matColumnDef="role">
                <th mat-header-cell *matHeaderCellDef>Role</th>
                <td mat-cell *matCellDef="let user">
                    <mat-chip [color]="user.role === 'admin' ? 'primary' : undefined" [highlighted]="true"
                        [attr.data-test-id]="'user-role-chip-' + user.uid">
                        {{ user.role }}
                    </mat-chip>
                </td>
            </ng-container>

            <!-- Created At Column -->
            <ng-container matColumnDef="createdAt">
                <th mat-header-cell *matHeaderCellDef>Created</th>
                <td mat-cell *matCellDef="let user" data-test-id="user-created-cell">
                    {{ user.createdAt?.toDate() | date : 'mediumDate' }}
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let user">
                    <button mat-icon-button color="primary" matTooltip="Edit user"
                        [attr.data-test-id]="'user-edit-button-' + user.uid" (click)="navigateToEdit(user.uid)">
                        <i-tabler name="edit" class="icon-18 d-flex"></i-tabler>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns" [attr.data-test-id]="'user-row-' + row.uid">
            </tr>
        </table>
        }
    </mat-card-content>
</mat-card>
