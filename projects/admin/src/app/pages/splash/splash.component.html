<div class="flex flex-col items-center justify-center min-h-screen bg-white" data-test-id="splash-screen">
    <div class="flex flex-col items-center gap-8" data-test-id="splash-content">
        <!-- Brand logo -->
        <img src="assets/images/logos/novus-banner.png" alt="Novus App" class="h-10" data-test-id="splash-logo" />

        <!-- Animated loading dots -->
        <div class="flex gap-2" data-test-id="splash-loader">
            <span class="w-2.5 h-2.5 rounded-full bg-primary animate-bounce [animation-delay:-0.3s]"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-primary animate-bounce [animation-delay:-0.15s]"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-primary animate-bounce"></span>
        </div>
    </div>
</div>
