name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ─── Firebase Emulators ───────────────────────────────────────
      # Uses demo-project (no credentials needed for demo-* project IDs)
      - name: Start Firebase Emulators
        run: npx firebase-tools emulators:start --project demo-project --only auth,firestore,storage &
        env:
          FIREBASE_CLI_TELEMETRY_DISABLED: "1"

      # Wait for emulator ports before building — ensures emulators are
      # ready before the apps start and attempt connections on first load
      - name: Wait for Firebase Emulators
        run: npx wait-on tcp:9098 tcp:8085 tcp:9199 -t 60000

      # ─── Angular Apps ─────────────────────────────────────────────
      - name: Build Admin app
        run: npm run build:admin

      - name: Build User app
        run: npm run build:user

      - name: Serve Admin app (port 4200)
        run: npx serve -l 4200 -s dist/admin/browser &

      - name: Serve User app (port 4400)
        run: npx serve -l 4400 -s dist/user-app/browser &

      # ─── Wait for app servers to be ready ────────────────────────
      - name: Wait for apps
        run: npx wait-on http://localhost:4200 http://localhost:4400 -t 30000

      # ─── Run Tests ────────────────────────────────────────────────
      - name: Run Admin E2E tests
        run: npm run test:e2e:admin

      - name: Run User E2E tests
        run: npm run test:e2e:user

      # ─── Artifacts ────────────────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
